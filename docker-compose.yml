services:
  db:
    image: postgres:15-alpine
    container_name: rep-vault-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rep-vault-app
    restart: always
    ports:
      - '3000:3000'
    environment:
      # Connect directly to the local postgres container
      DATABASE_URL: 'postgresql://postgres:postgrespassword@db:5432/postgres'
      DIRECT_URL: 'postgresql://postgres:postgrespassword@db:5432/postgres'
      AUTH_SECRET: 'dev-only-auth-secret-change-me'
      NEXT_PUBLIC_WEBAUTHN_RPID: 'localhost'
      # Keep historical API import opt-in for safer startup.
      RUN_IMPORT_ON_STARTUP: 'false'
      # Keep Next.js fast in dev
      NODE_ENV: 'development'
      NEXT_TELEMETRY_DISABLED: '1'
    volumes:
      # Mount the local codebase into the container for Hot Module Replacement (HMR)
      - .:/app
      # Map node_modules anonymously so it uses the container's installed modules
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    # Command to install dependencies, migrate, seed, and then run dev server.
    # Historical import is disabled by default and can be enabled with RUN_IMPORT_ON_STARTUP=true.
    command: sh -c "npm install && npx prisma migrate dev --name init && npx tsx scripts/seed.ts && if [ \"$RUN_IMPORT_ON_STARTUP\" = \"true\" ]; then npx tsx scripts/import_true_history.ts; else echo \"Skipping historical import (set RUN_IMPORT_ON_STARTUP=true to enable).\"; fi && npm run dev"

volumes:
  pgdata:
    driver: local
